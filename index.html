<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Pargo Parcels data warehouse and machine learning analytics dashboard by Anthony Apollis.">
<meta http-equiv="refresh" content="0; url=pargo_dashboard.html">
<title>Pargo Parcels Analytics</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #29b5e8;
  }
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top left, rgba(41, 181, 232, .16), transparent 34%), var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  main {
    width: min(680px, calc(100% - 40px));
    padding: 34px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: rgba(22, 27, 34, .92);
    box-shadow: 0 24px 70px rgba(0, 0, 0, .35);
  }
  h1 { margin: 0 0 10px; color: var(--accent); font-size: clamp(28px, 5vw, 42px); line-height: 1.05; }
  p { margin: 0 0 22px; color: var(--muted); line-height: 1.65; }
  .actions { display: flex; flex-wrap: wrap; gap: 12px; }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
  }
  a.primary { background: var(--accent); border-color: var(--accent); color: #071016; }
  a:hover { filter: brightness(1.08); transform: translateY(-1px); }
</style>
</head>
<body>
<main>
  <h1>Pargo Parcels Analytics</h1>
  <p>Opening the live data warehouse and machine learning dashboard. If it does not redirect automatically, use the dashboard link below.</p>
  <div class="actions">
    <a class="primary" href="pargo_dashboard.html">Open Dashboard</a>
    <a href="pargo_ml_visuals.html">ML Visuals</a>
    <a href="pargo_data_dictionary.md">Data Dictionary</a>
  </div>
</main>
</body>
</html>
